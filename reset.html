<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f4f7ff, #e8f4ff);
      }
      .reset-card {
        width: 100%;
        max-width: 420px;
        border: 0;
        border-radius: 1rem;
      }
      .brand-mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 0.85rem;
      }
    </style>
  </head>
  <body class="d-flex align-items-center py-5">
    <main class="container">
      <section class="card reset-card shadow-lg mx-auto">
        <div class="card-body p-4 p-md-5">
          <div class="brand-mark bg-primary text-white mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0a4 4 0 0 0-4 4v1H3a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V4a4 4 0 0 0-4-4Zm-3 5V4a3 3 0 0 1 6 0v1H5Zm3 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z" />
            </svg>
          </div>
          <h1 class="h3 fw-bold mb-2">Reset your password</h1>
          <p class="text-secondary mb-4">Enter your email address and we will send you a link to reset your password.</p>

          <form>
            <div class="mb-4">
              <label for="reset-email" class="form-label">Email address</label>
              <input type="email" class="form-control form-control-lg" id="reset-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Send reset link</button>
          </form>

          <p class="text-center text-secondary small mb-0 mt-4">
            Remember your password? <a href="index.html" class="text-decoration-none">Sign in</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
